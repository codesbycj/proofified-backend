name: keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/health
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://proofified-backend.onrender.com/api/health
